name: 获取 WSL2 内核版本标签

on:
  workflow_call:
    inputs:
      tag:
        description: '指定标签（留空则使用最新发布版）'
        required: false
        type: string
        default: ''
    secrets:
      github-token:
        required: false
    outputs:
      tag:
        description: '选中的标签名称'
        value: ${{ jobs.获取标签.outputs.tag }}

permissions:
  contents: read

jobs:
  获取标签:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.output-tag.outputs.tag }}
    steps:
      - name: 获取标签
        id: output-tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            echo "使用手动指定的标签: $TAG"
          else
            echo "正在获取最新发布版标签..."
            TAG=$(curl -sSfL \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "GitHub Actions (WSL2 Kernel Build)" \
              --header "Authorization: Bearer ${{ secrets.github-token }}" \
              "https://api.github.com/repos/microsoft/WSL2-Linux-Kernel/releases/latest" | \
              jq -r '.tag_name')
            echo "使用最新发布版标签: $TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
