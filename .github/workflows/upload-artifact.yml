name: 上传最终内核产物

on:
  workflow_call:
    inputs:
      tag:
        description: '发布标签'
        required: true
        type: string

permissions:
  contents: read

jobs:
  上传产物:
    runs-on: ubuntu-latest
    steps:
      - name: 下载编译好的内核
        uses: actions/download-artifact@v4
        with:
          name: kernel-built-${{ inputs.tag }}
          path: .
      - name: 上传最终 bzImage
        uses: actions/upload-artifact@v4
        with:
          name: bzImage-${{ inputs.tag }}
          path: bzImage
          retention-days: 90
          compression-level: 6
