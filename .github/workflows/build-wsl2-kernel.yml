name: 构建 WSL2 内核

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:
    inputs:
      tag:
        description: '指定标签（留空则使用最新发布版）'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: 准备构建
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check-need-build.outputs.should_build }}
      skip_reason: ${{ steps.check-need-build.outputs.skip_reason }}
      tag: ${{ steps.get-tag.outputs.tag }}
      published_at: ${{ steps.get-tag.outputs.published_at }}
      src_dir: ${{ steps.get-tag.outputs.src-dir }}
    steps:
      - name: 工作流信息展示
        run: |
          echo "=== 工作流开始 ==="
          echo "触发方式: ${{ github.event_name }}"
          echo "运行器: ${{ runner.os }} ${{ runner.arch }}"
          echo "当前时间: $(date)"
          echo "GitHub 仓库: ${{ github.repository }}"
          echo "提交 SHA: ${{ github.sha }}"
          if [ -n "${{ inputs.tag }}" ]; then
            echo "用户指定标签: ${{ inputs.tag }}"
          else
            echo "将获取最新发布版"
          fi
          echo "===================="

      - name: 获取版本标签
        id: get-tag
        run: |
          set -euo pipefail
          echo "步骤 1: 获取版本标签"
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            echo "使用手动指定的标签: $TAG"
            PUBLISHED_AT=""
          else
            echo "正在调用 GitHub API 获取最新发布版..."
            API_RESPONSE=$(curl -sSfL \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "GitHub Actions (WSL2 Kernel Build)" \
              --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/microsoft/WSL2-Linux-Kernel/releases/latest")
            TAG=$(echo "$API_RESPONSE" | jq -r '.tag_name')
            RELEASE_NAME=$(echo "$API_RESPONSE" | jq -r '.name')
            PUBLISHED_AT=$(echo "$API_RESPONSE" | jq -r '.published_at')
            echo "使用最新发布版"
            echo "   标签: $TAG"
            echo "   发布名称: $RELEASE_NAME"
            echo "   发布时间: $PUBLISHED_AT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "published_at=$PUBLISHED_AT" >> "$GITHUB_OUTPUT"
          echo "src-dir=WSL2-Linux-Kernel-$TAG" >> "$GITHUB_OUTPUT"

      - name: 检查是否需要编译
        id: check-need-build
        run: |
          set -euo pipefail
          echo "步骤 2: 检查是否需要编译"
          TAG="${{ steps.get-tag.outputs.tag }}"
          PUBLISHED_AT="${{ steps.get-tag.outputs.published_at }}"
          EVENT_NAME="${{ github.event_name }}"
          SHOULD_BUILD="true"
          SKIP_REASON=""
          
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "手动触发，将执行编译"
            SHOULD_BUILD="true"
          else
            echo "检查是否已存在该标签的 release"
            RELEASE_API="https://api.github.com/repos/${{ github.repository }}/releases"
            RELEASE_RESPONSE=$(curl -sSfL \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "GitHub Actions (WSL2 Kernel Build)" \
              --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "$RELEASE_API" || echo "[]")
            if echo "$RELEASE_RESPONSE" | grep -q "\"tag_name\":\"$TAG\""; then
              echo "发现已存在的 release: $TAG"
              SHOULD_BUILD="false"
              SKIP_REASON="该标签的 release 已存在"
            else
              if [ -n "$PUBLISHED_AT" ]; then
                echo "检查发布时间是否在最近 2 天内"
                PUBLISHED_SECONDS=$(date -d "$PUBLISHED_AT" +%s 2>/dev/null || echo 0)
                NOW_SECONDS=$(date +%s)
                TWO_DAYS=$((2 * 24 * 3600))
                if [ "$PUBLISHED_SECONDS" -eq 0 ]; then
                  echo "无法解析发布时间，继续执行编译"
                  SHOULD_BUILD="true"
                else
                  TIME_DIFF=$((NOW_SECONDS - PUBLISHED_SECONDS))
                  echo "发布至今: $TIME_DIFF 秒"
                  if [ "$TIME_DIFF" -le "$TWO_DAYS" ]; then
                    echo "发布在 2 天内，将执行编译"
                    SHOULD_BUILD="true"
                  else
                    echo "发布时间超过 2 天，跳过编译"
                    SHOULD_BUILD="false"
                    SKIP_REASON="发布时间超过 2 天"
                  fi
                fi
              else
                echo "无发布时间信息，将执行编译"
                SHOULD_BUILD="true"
              fi
            fi
          fi
          
          echo "===================="
          echo "编译决策结果"
          echo "===================="
          echo "标签: $TAG"
          echo "需要编译: $SHOULD_BUILD"
          if [ -n "$SKIP_REASON" ]; then
            echo "跳过原因: $SKIP_REASON"
          fi
          echo "===================="
          
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"

  build:
    name: 编译 ${{ matrix.arch }}
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            kernel_arch: x86
            kernel_target: bzImage
            cross_compile: ""
            extra_deps: ""
          - arch: arm64
            kernel_arch: arm64
            kernel_target: Image.gz
            cross_compile: aarch64-linux-gnu-
            extra_deps: "gcc-aarch64-linux-gnu"
    outputs:
      output_file: ${{ steps.verify.outputs.output_file }}
    steps:
      - name: 下载并解压源码
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          echo "下载并解压源码"
          echo "下载地址: https://github.com/microsoft/WSL2-Linux-Kernel/archive/refs/tags/$TAG.tar.gz"
          echo "正在下载..."
          curl -sSfL \
            --retry 3 \
            --retry-delay 5 \
            --user-agent "GitHub Actions (WSL2 Kernel Build)" \
            --progress-bar \
            -o kernel.tar.gz \
            "https://github.com/microsoft/WSL2-Linux-Kernel/archive/refs/tags/$TAG.tar.gz"
          echo "下载完成"
          FILE_SIZE=$(du -h kernel.tar.gz | cut -f1)
          echo "文件大小: $FILE_SIZE"
          echo "正在解压源码包..."
          tar xzf kernel.tar.gz
          echo "解压完成"
          SRC_DIR="${{ needs.prepare.outputs.src_dir }}"
          if [ -d "$SRC_DIR" ]; then
            echo "目录大小: $(du -sh "$SRC_DIR" | cut -f1)"
            echo "文件数: $(find "$SRC_DIR" -type f | wc -l)"
          else
            echo "警告: 目录 $SRC_DIR 不存在！"
          fi
          echo "清理临时文件 kernel.tar.gz..."
          rm -f kernel.tar.gz
          echo "源码准备完成"

      - name: 安装编译依赖
        run: |
          set -euo pipefail
          echo "安装编译依赖"
          echo "正在更新软件包列表..."
          sudo apt-get update -qq
          echo "正在安装编译依赖..."
          DEPENDENCIES=(
            "build-essential"
            "flex"
            "bison"
            "dwarves"
            "libssl-dev"
            "libelf-dev"
            "bc"
            "python3"
            "cpio"
            "qemu-utils"
            ${{ matrix.extra_deps }}
          )
          echo "将安装 ${#DEPENDENCIES[@]} 个软件包"
          for pkg in "${DEPENDENCIES[@]}"; do
            echo "  - $pkg"
          done
          sudo apt-get install -y "${DEPENDENCIES[@]}"
          echo "依赖安装完成"
          echo "检查 gcc 版本:"
          gcc --version
          if [ -n "${{ matrix.cross_compile }}" ]; then
            echo "检查交叉编译器版本:"
            ${{ matrix.cross_compile }}gcc --version
          fi

      - name: 编译内核 (${{ matrix.arch }})
        run: |
          set -euo pipefail
          SRC_DIR="${{ needs.prepare.outputs.src_dir }}"
          cd "$SRC_DIR"
          echo "当前目录: $(pwd)"
          CONFIG_FILE="Microsoft/config-wsl"
          echo "使用配置文件: $CONFIG_FILE"
          if [ -f "$CONFIG_FILE" ]; then
            echo "配置文件存在"
            echo "配置文件大小: $(du -h "$CONFIG_FILE" | cut -f1)"
          else
            echo "错误: 配置文件不存在！"
            exit 1
          fi
          echo "开始编译 ${{ matrix.arch }} 内核..."
          echo "编译开始时间: $(date -u)"
          echo "可用核心数: $(nproc)"
          echo "内存信息:"
          free -h
          echo "-------------------"
          echo "开始 make..."
          echo "-------------------"
          if [ -n "${{ matrix.cross_compile }}" ]; then
            time make -j$(nproc) ARCH=${{ matrix.kernel_arch }} CROSS_COMPILE=${{ matrix.cross_compile }} KCONFIG_CONFIG="$CONFIG_FILE" ${{ matrix.kernel_target }}
          else
            time make -j$(nproc) KCONFIG_CONFIG="$CONFIG_FILE" ${{ matrix.kernel_target }}
          fi
          echo "-------------------"
          echo "编译完成时间: $(date -u)"

      - name: 验证内核镜像
        id: verify
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          SRC_DIR="${{ needs.prepare.outputs.src_dir }}"

          if [ "${{ matrix.arch }}" = "x64" ]; then
            IMAGE_PATH="$SRC_DIR/arch/x86/boot/bzImage"
          else
            if [ -f "$SRC_DIR/arch/arm64/boot/Image.gz" ]; then
              IMAGE_PATH="$SRC_DIR/arch/arm64/boot/Image.gz"
            elif [ -f "$SRC_DIR/arch/arm64/boot/Image" ]; then
              IMAGE_PATH="$SRC_DIR/arch/arm64/boot/Image"
            else
              echo "错误: 在 $SRC_DIR/arch/arm64/boot/ 未找到 ARM64 内核镜像"
              ls -la "$SRC_DIR/arch/arm64/boot/" 2>/dev/null || echo "目录不存在"
              exit 1
            fi
          fi

          if [ ! -f "$IMAGE_PATH" ]; then
            echo "错误: 在 $IMAGE_PATH 未找到内核镜像"
            ls -la "$(dirname "$IMAGE_PATH")" 2>/dev/null || echo "目录不存在"
            exit 1
          fi
          echo "${{ matrix.arch }} 内核镜像验证成功！"
          echo "文件路径: $IMAGE_PATH"
          echo "文件大小: $(du -h "$IMAGE_PATH" | cut -f1)"

          OUTPUT_FILE="bzImage-$TAG-${{ matrix.arch }}"
          cp "$IMAGE_PATH" "$OUTPUT_FILE"
          echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"
          echo "文件已重命名为: $OUTPUT_FILE"

      - name: 编译摘要
        run: |
          set -euo pipefail
          echo "======================================="
          echo "${{ matrix.arch }} 构建成功！"
          echo "======================================="
          TAG="${{ needs.prepare.outputs.tag }}"
          echo "标签: $TAG"
          OUTPUT_FILE="bzImage-$TAG-${{ matrix.arch }}"
          if [ -f "$OUTPUT_FILE" ]; then
            echo "文件名: $OUTPUT_FILE"
            echo "文件大小: $(du -h "$OUTPUT_FILE" | cut -f1)"
            echo "MD5: $(md5sum "$OUTPUT_FILE" | cut -d' ' -f1)"
            echo "SHA256: $(sha256sum "$OUTPUT_FILE" | cut -d' ' -f1)"
          fi
          echo "======================================="

      - name: 上传临时内核镜像 (保留 1 天)
        uses: actions/upload-artifact@v4
        with:
          name: bzImage-${{ needs.prepare.outputs.tag }}-${{ matrix.arch }}
          path: bzImage-${{ needs.prepare.outputs.tag }}-${{ matrix.arch }}
          retention-days: 1
          compression-level: 6

  release:
    name: 发布内核
    needs: [prepare, build]
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 下载 x64 内核镜像
        uses: actions/download-artifact@v4
        with:
          name: bzImage-${{ needs.prepare.outputs.tag }}-x64

      - name: 下载 ARM64 内核镜像
        uses: actions/download-artifact@v4
        with:
          name: bzImage-${{ needs.prepare.outputs.tag }}-arm64

      - name: 显示文件
        run: |
          ls -la

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          files: |
            bzImage-${{ needs.prepare.outputs.tag }}-x64
            bzImage-${{ needs.prepare.outputs.tag }}-arm64
          body: |
            # WSL2 内核编译

            发布版本：${{ needs.prepare.outputs.tag }}

            架构：x64 / ARM64

            基于 [microsoft/WSL2-Linux-Kernel](https://github.com/microsoft/WSL2-Linux-Kernel) 的对应版本编译。
