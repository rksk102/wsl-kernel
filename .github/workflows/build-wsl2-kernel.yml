name: 构建 WSL2 内核

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:
    inputs:
      tag:
        description: '指定标签（留空则使用最新发布版）'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  build_and_release:
    name: 构建内核
    runs-on: ubuntu-latest
    steps:
      - name: 工作流信息展示
        run: |
          echo "=== 工作流开始 ==="
          echo "触发方式: ${{ github.event_name }}"
          echo "运行器: ${{ runner.os }} ${{ runner.arch }}"
          echo "当前时间: $(date)"
          echo "GitHub 仓库: ${{ github.repository }}"
          echo "提交 SHA: ${{ github.sha }}"
          if [ -n "${{ inputs.tag }}" ]; then
            echo "用户指定标签: ${{ inputs.tag }}"
          else
            echo "将获取最新发布版"
          fi
          echo "===================="

      - name: 获取版本标签
        id: get-tag
        run: |
          set -euo pipefail
          echo "步骤 1/9: 获取版本标签"
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            echo "使用手动指定的标签: $TAG"
            PUBLISHED_AT=""
          else
            echo "正在调用 GitHub API 获取最新发布版..."
            API_RESPONSE=$(curl -sSfL \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "GitHub Actions (WSL2 Kernel Build)" \
              --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/microsoft/WSL2-Linux-Kernel/releases/latest")
            TAG=$(echo "$API_RESPONSE" | jq -r '.tag_name')
            RELEASE_NAME=$(echo "$API_RESPONSE" | jq -r '.name')
            PUBLISHED_AT=$(echo "$API_RESPONSE" | jq -r '.published_at')
            echo "使用最新发布版"
            echo "   标签: $TAG"
            echo "   发布名称: $RELEASE_NAME"
            echo "   发布时间: $PUBLISHED_AT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "published_at=$PUBLISHED_AT" >> "$GITHUB_OUTPUT"
          echo "src-dir=WSL2-Linux-Kernel-$TAG" >> "$GITHUB_OUTPUT"

      - name: 检查是否需要编译
        id: check-need-build
        run: |
          set -euo pipefail
          echo "步骤 2/9: 检查是否需要编译"
          TAG="${{ steps.get-tag.outputs.tag }}"
          PUBLISHED_AT="${{ steps.get-tag.outputs.published_at }}"
          EVENT_NAME="${{ github.event_name }}"
          SHOULD_BUILD="true"
          SKIP_REASON=""
          
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "手动触发，将执行编译"
            SHOULD_BUILD="true"
          else
            echo "检查是否已存在该标签的 release"
            RELEASE_API="https://api.github.com/repos/${{ github.repository }}/releases"
            RELEASE_RESPONSE=$(curl -sSfL \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "GitHub Actions (WSL2 Kernel Build)" \
              --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "$RELEASE_API" || echo "[]")
            if echo "$RELEASE_RESPONSE" | grep -q "\"tag_name\":\"$TAG\""; then
              echo "发现已存在的 release: $TAG"
              SHOULD_BUILD="false"
              SKIP_REASON="该标签的 release 已存在"
            else
              if [ -n "$PUBLISHED_AT" ]; then
                echo "检查发布时间是否在最近 2 天内"
                PUBLISHED_SECONDS=$(date -d "$PUBLISHED_AT" +%s 2>/dev/null || echo 0)
                NOW_SECONDS=$(date +%s)
                TWO_DAYS=$((2 * 24 * 3600))
                if [ "$PUBLISHED_SECONDS" -eq 0 ]; then
                  echo "无法解析发布时间，继续执行编译"
                  SHOULD_BUILD="true"
                else
                  TIME_DIFF=$((NOW_SECONDS - PUBLISHED_SECONDS))
                  echo "发布至今: $TIME_DIFF 秒"
                  if [ "$TIME_DIFF" -le "$TWO_DAYS" ]; then
                    echo "发布在 2 天内，将执行编译"
                    SHOULD_BUILD="true"
                  else
                    echo "发布时间超过 2 天，跳过编译"
                    SHOULD_BUILD="false"
                    SKIP_REASON="发布时间超过 2 天"
                  fi
                fi
              else
                echo "无发布时间信息，将执行编译"
                SHOULD_BUILD="true"
              fi
            fi
          fi
          
          echo "===================="
          echo "编译决策结果"
          echo "===================="
          echo "标签: $TAG"
          echo "需要编译: $SHOULD_BUILD"
          if [ -n "$SKIP_REASON" ]; then
            echo "跳过原因: $SKIP_REASON"
          fi
          echo "===================="
          
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"

      - name: 下载并解压源码
        if: steps.check-need-build.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.get-tag.outputs.tag }}"
          echo "步骤 3/9: 下载并解压源码"
          echo "下载地址: https://github.com/microsoft/WSL2-Linux-Kernel/archive/refs/tags/$TAG.tar.gz"
          echo "正在下载..."
          curl -sSfL \
            --retry 3 \
            --retry-delay 5 \
            --user-agent "GitHub Actions (WSL2 Kernel Build)" \
            --progress-bar \
            -o kernel.tar.gz \
            "https://github.com/microsoft/WSL2-Linux-Kernel/archive/refs/tags/$TAG.tar.gz"
          echo "下载完成"
          FILE_SIZE=$(du -h kernel.tar.gz | cut -f1)
          echo "文件大小: $FILE_SIZE"
          echo "正在解压源码包..."
          tar xzf kernel.tar.gz
          echo "解压完成"
          SRC_DIR="${{ steps.get-tag.outputs.src-dir }}"
          if [ -d "$SRC_DIR" ]; then
            echo "目录大小: $(du -sh "$SRC_DIR" | cut -f1)"
            echo "文件数: $(find "$SRC_DIR" -type f | wc -l)"
          else
            echo "警告: 目录 $SRC_DIR 不存在！"
          fi
          echo "清理临时文件 kernel.tar.gz..."
          rm -f kernel.tar.gz
          echo "源码准备完成"

      - name: 安装编译依赖
        if: steps.check-need-build.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          echo "步骤 4/9: 安装编译依赖"
          echo "正在更新软件包列表..."
          sudo apt-get update -qq
          echo "正在安装编译依赖..."
          DEPENDENCIES=(
            "build-essential"
            "flex"
            "bison"
            "dwarves"
            "libssl-dev"
            "libelf-dev"
            "bc"
            "python3"
            "cpio"
            "qemu-utils"
            "gcc-aarch64-linux-gnu"
          )
          echo "将安装 ${#DEPENDENCIES[@]} 个软件包"
          for pkg in "${DEPENDENCIES[@]}"; do
            echo "  - $pkg"
          done
          sudo apt-get install -y "${DEPENDENCIES[@]}"
          echo "依赖安装完成"
          echo "检查 gcc 版本:"
          gcc --version

      - name: 编译内核 (x64)
        if: steps.check-need-build.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          echo "步骤 5/9: 编译 x64 内核"
          SRC_DIR="${{ steps.get-tag.outputs.src-dir }}"
          cd "$SRC_DIR"
          echo "当前目录: $(pwd)"
          CONFIG_FILE="Microsoft/config-wsl"
          echo "使用配置文件: $CONFIG_FILE"
          if [ -f "$CONFIG_FILE" ]; then
            echo "配置文件存在"
            echo "配置文件大小: $(du -h "$CONFIG_FILE" | cut -f1)"
          else
            echo "错误: 配置文件不存在！"
            exit 1
          fi
          echo "开始编译 x64 内核..."
          echo "编译开始时间: $(date -u)"
          echo "可用核心数: $(nproc)"
          echo "内存信息:"
          free -h
          echo "-------------------"
          echo "开始 make x64..."
          echo "-------------------"
          time make -j$(nproc) KCONFIG_CONFIG="$CONFIG_FILE"
          echo "-------------------"
          echo "x64 编译完成时间: $(date -u)"

      - name: 编译内核 (ARM64)
        if: steps.check-need-build.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          echo "步骤 6/9: 编译 ARM64 内核"
          SRC_DIR="${{ steps.get-tag.outputs.src-dir }}"
          cd "$SRC_DIR"
          echo "当前目录: $(pwd)"
          CONFIG_FILE="Microsoft/config-wsl"
          echo "使用配置文件: $CONFIG_FILE"
          echo "清理 x64 编译产物..."
          make mrproper
          echo "开始编译 ARM64 内核..."
          echo "编译开始时间: $(date -u)"
          echo "可用核心数: $(nproc)"
          echo "内存信息:"
          free -h
          echo "-------------------"
          echo "开始 make ARM64..."
          echo "-------------------"
          time make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCONFIG_CONFIG="$CONFIG_FILE"
          echo "-------------------"
          echo "ARM64 编译完成时间: $(date -u)"

      - name: 验证内核镜像
        if: steps.check-need-build.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          echo "步骤 7/9: 验证内核镜像"
          TAG="${{ steps.get-tag.outputs.tag }}"
          SRC_DIR="${{ steps.get-tag.outputs.src-dir }}"

          BZIMAGE_PATH="$SRC_DIR/arch/x86/boot/bzImage"
          ARM64_IMAGE_PATH="$SRC_DIR/arch/arm64/boot/Image"
          ARM64_IMAGE_GZ_PATH="$SRC_DIR/arch/arm64/boot/Image.gz"

          if [ ! -f "$BZIMAGE_PATH" ]; then
            echo "错误: 在 $BZIMAGE_PATH 未找到 bzImage"
            ls -la "$SRC_DIR/arch/x86/boot/" 2>/dev/null || echo "目录不存在"
            exit 1
          fi
          echo "x64 bzImage 验证成功！"
          echo "文件路径: $BZIMAGE_PATH"
          echo "文件大小: $(du -h "$BZIMAGE_PATH" | cut -f1)"

          if [ -f "$ARM64_IMAGE_GZ_PATH" ]; then
            ARM64_IMAGE="$ARM64_IMAGE_GZ_PATH"
            ARM64_SUFFIX="Image.gz"
          elif [ -f "$ARM64_IMAGE_PATH" ]; then
            ARM64_IMAGE="$ARM64_IMAGE_PATH"
            ARM64_SUFFIX="Image"
          else
            echo "错误: 在 $SRC_DIR/arch/arm64/boot/ 未找到 ARM64 内核镜像"
            ls -la "$SRC_DIR/arch/arm64/boot/" 2>/dev/null || echo "目录不存在"
            exit 1
          fi
          echo "ARM64 内核镜像验证成功！"
          echo "文件类型: $ARM64_SUFFIX"
          echo "文件路径: $ARM64_IMAGE"
          echo "文件大小: $(du -h "$ARM64_IMAGE" | cut -f1)"

          X64_OUTPUT="bzImage-$TAG-x64"
          ARM64_OUTPUT="bzImage-$TAG-arm64"
          cp "$BZIMAGE_PATH" "$X64_OUTPUT"
          cp "$ARM64_IMAGE" "$ARM64_OUTPUT"
          echo "x64_output=$X64_OUTPUT" >> "$GITHUB_ENV"
          echo "arm64_output=$ARM64_OUTPUT" >> "$GITHUB_ENV"
          echo "文件已重命名为: $X64_OUTPUT, $ARM64_OUTPUT"

      - name: 编译摘要
        if: steps.check-need-build.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          echo "步骤 8/9: 编译摘要"
          echo "======================================="
          echo "构建成功！"
          echo "======================================="
          TAG="${{ steps.get-tag.outputs.tag }}"
          echo "标签: $TAG"
          if [ -f "$x64_output" ]; then
            echo "--- x64 ---"
            echo "文件名: $x64_output"
            echo "文件大小: $(du -h "$x64_output" | cut -f1)"
            echo "MD5: $(md5sum "$x64_output" | cut -d' ' -f1)"
            echo "SHA256: $(sha256sum "$x64_output" | cut -d' ' -f1)"
          fi
          if [ -f "$arm64_output" ]; then
            echo "--- ARM64 ---"
            echo "文件名: $arm64_output"
            echo "文件大小: $(du -h "$arm64_output" | cut -f1)"
            echo "MD5: $(md5sum "$arm64_output" | cut -d' ' -f1)"
            echo "SHA256: $(sha256sum "$arm64_output" | cut -d' ' -f1)"
          fi
          echo "======================================="

      - name: 上传临时内核镜像 (保留 1 天)
        if: steps.check-need-build.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-images-${{ steps.get-tag.outputs.tag }}
          path: |
            ${{ env.x64_output }}
            ${{ env.arm64_output }}
          retention-days: 1
          compression-level: 6

      - name: 发布到 GitHub Releases
        if: steps.check-need-build.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-tag.outputs.tag }}
          name: ${{ steps.get-tag.outputs.tag }}
          files: |
            ${{ env.x64_output }}
            ${{ env.arm64_output }}
          body: |
            # WSL2 内核编译

            发布版本：${{ steps.get-tag.outputs.tag }}

            架构：x64 / ARM64

            基于 [microsoft/WSL2-Linux-Kernel](https://github.com/microsoft/WSL2-Linux-Kernel) 的对应版本编译。
