name: 构建 WSL2 内核

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:
    inputs:
      tag:
        description: '指定标签（留空则使用最新发布版）'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: build-wsl2-kernel-${{ github.event.inputs.tag || 'scheduled' }}
  cancel-in-progress: false

jobs:
  prepare:
    name: 准备构建
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.check-need-build.outputs.should_build }}
      skip_reason: ${{ steps.check-need-build.outputs.skip_reason }}
      tag: ${{ steps.get-tag.outputs.tag }}
      published_at: ${{ steps.get-tag.outputs.published_at }}
      src_dir: ${{ steps.get-tag.outputs.src-dir }}
    steps:
      - name: 工作流信息展示
        run: |
          echo "=== 工作流开始 ==="
          echo "触发方式: ${{ github.event_name }}"
          echo "运行器: ${{ runner.os }} ${{ runner.arch }}"
          echo "当前时间: $(date)"
          echo "GitHub 仓库: ${{ github.repository }}"
          echo "提交 SHA: ${{ github.sha }}"
          if [ -n "${{ inputs.tag }}" ]; then
            echo "用户指定标签: ${{ inputs.tag }}"
          else
            echo "将获取最新发布版"
          fi
          echo "===================="

      - name: 获取版本标签
        id: get-tag
        run: |
          set -euo pipefail
          echo "步骤 1: 获取版本标签"
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            echo "使用手动指定的标签: $TAG"
            PUBLISHED_AT=""
          else
            echo "正在调用 GitHub API 获取最新发布版..."
            API_RESPONSE=$(curl -sSfL \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "GitHub Actions (WSL2 Kernel Build)" \
              --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/microsoft/WSL2-Linux-Kernel/releases/latest")
            TAG=$(echo "$API_RESPONSE" | jq -r '.tag_name')
            RELEASE_NAME=$(echo "$API_RESPONSE" | jq -r '.name')
            PUBLISHED_AT=$(echo "$API_RESPONSE" | jq -r '.published_at')
            echo "使用最新发布版"
            echo "   标签: $TAG"
            echo "   发布名称: $RELEASE_NAME"
            echo "   发布时间: $PUBLISHED_AT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "published_at=$PUBLISHED_AT" >> "$GITHUB_OUTPUT"
          echo "src-dir=WSL2-Linux-Kernel-$TAG" >> "$GITHUB_OUTPUT"

      - name: 检查是否需要编译
        id: check-need-build
        run: |
          set -euo pipefail
          echo "步骤 2: 检查是否需要编译"
          TAG="${{ steps.get-tag.outputs.tag }}"
          PUBLISHED_AT="${{ steps.get-tag.outputs.published_at }}"
          EVENT_NAME="${{ github.event_name }}"
          SHOULD_BUILD="true"
          SKIP_REASON=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "手动触发，将执行编译"
            SHOULD_BUILD="true"
          else
            echo "检查是否已存在该标签的 release"
            RELEASE_API="https://api.github.com/repos/${{ github.repository }}/releases"
            RELEASE_RESPONSE=$(curl -sSfL \
              --retry 3 \
              --retry-delay 5 \
              --user-agent "GitHub Actions (WSL2 Kernel Build)" \
              --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "$RELEASE_API" || echo "[]")
            if echo "$RELEASE_RESPONSE" | jq -e --arg tag "$TAG" '.[] | select(.tag_name == $tag)' > /dev/null 2>&1; then
              echo "发现已存在的 release: $TAG"
              SHOULD_BUILD="false"
              SKIP_REASON="该标签的 release 已存在"
            else
              if [ -n "$PUBLISHED_AT" ]; then
                echo "检查发布时间是否在最近 2 天内"
                PUBLISHED_SECONDS=$(date -d "$PUBLISHED_AT" +%s 2>/dev/null || echo 0)
                NOW_SECONDS=$(date +%s)
                TWO_DAYS=$((2 * 24 * 3600))
                if [ "$PUBLISHED_SECONDS" -eq 0 ]; then
                  echo "无法解析发布时间，继续执行编译"
                  SHOULD_BUILD="true"
                else
                  TIME_DIFF=$((NOW_SECONDS - PUBLISHED_SECONDS))
                  echo "发布至今: $TIME_DIFF 秒"
                  if [ "$TIME_DIFF" -le "$TWO_DAYS" ]; then
                    echo "发布在 2 天内，将执行编译"
                    SHOULD_BUILD="true"
                  else
                    echo "发布时间超过 2 天，跳过编译"
                    SHOULD_BUILD="false"
                    SKIP_REASON="发布时间超过 2 天"
                  fi
                fi
              else
                echo "无发布时间信息，将执行编译"
                SHOULD_BUILD="true"
              fi
            fi
          fi

          echo "===================="
          echo "编译决策结果"
          echo "===================="
          echo "标签: $TAG"
          echo "需要编译: $SHOULD_BUILD"
          if [ -n "$SKIP_REASON" ]; then
            echo "跳过原因: $SKIP_REASON"
          fi
          echo "===================="

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"

  build:
    name: 编译 ${{ matrix.arch }}
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            kernel_arch: x86
            kernel_target: bzImage
            cross_compile: ""
            extra_deps: ""
          - arch: arm64
            kernel_arch: arm64
            kernel_target: Image.gz
            cross_compile: aarch64-linux-gnu-
            extra_deps: "gcc-aarch64-linux-gnu"
    steps:
      - name: 恢复 ccache 缓存
        id: ccache-restore
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.arch }}-${{ needs.prepare.outputs.tag }}
          restore-keys: |
            ccache-${{ matrix.arch }}-

      - name: 下载并解压源码
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          TARBALL_URL="https://github.com/microsoft/WSL2-Linux-Kernel/archive/refs/tags/$TAG.tar.gz"
          echo "下载并解压源码"
          echo "下载地址: $TARBALL_URL"
          echo "正在下载..."
          curl -sSfL \
            --retry 3 \
            --retry-delay 5 \
            --user-agent "GitHub Actions (WSL2 Kernel Build)" \
            --progress-bar \
            -o kernel.tar.gz \
            "$TARBALL_URL"
          echo "下载完成"
          FILE_SIZE=$(du -h kernel.tar.gz | cut -f1)
          echo "文件大小: $FILE_SIZE"

          echo "计算源码包校验和..."
          SHA256_TARBALL=$(sha256sum kernel.tar.gz | cut -d' ' -f1)
          echo "SHA256: $SHA256_TARBALL"

          echo "正在解压源码包..."
          tar xzf kernel.tar.gz
          echo "解压完成"
          SRC_DIR="${{ needs.prepare.outputs.src_dir }}"
          if [ -d "$SRC_DIR" ]; then
            echo "目录大小: $(du -sh "$SRC_DIR" | cut -f1)"
            echo "文件数: $(find "$SRC_DIR" -type f | wc -l)"
          else
            echo "错误: 目录 $SRC_DIR 不存在！"
            exit 1
          fi
          echo "清理临时文件 kernel.tar.gz..."
          rm -f kernel.tar.gz
          echo "源码准备完成"

          echo "tarball-sha256=$SHA256_TARBALL" >> "$GITHUB_OUTPUT"

      - name: 安装编译依赖
        run: |
          set -euo pipefail
          echo "安装编译依赖"
          echo "正在更新软件包列表..."
          sudo apt-get update -qq
          echo "正在安装编译依赖..."
          DEPS=(
            "build-essential"
            "flex"
            "bison"
            "dwarves"
            "libssl-dev"
            "libelf-dev"
            "bc"
            "python3"
            "cpio"
            "qemu-utils"
            "ccache"
          )
          EXTRA="${{ matrix.extra_deps }}"
          if [ -n "$EXTRA" ]; then
            DEPS+=("$EXTRA")
          fi
          echo "将安装 ${#DEPS[@]} 个软件包:"
          for pkg in "${DEPS[@]}"; do
            echo "  - $pkg"
          done
          sudo apt-get install -y "${DEPS[@]}"
          echo "依赖安装完成"

          ccache --version
          ccache --zero-stats
          ccache --max-size=2G
          echo "ccache 配置完成（上限: 2G）"

          echo "检查编译器版本:"
          echo "--- gcc ---"
          gcc --version | head -1
          if [ -n "${{ matrix.cross_compile }}" ]; then
            echo "--- 交叉编译器 ---"
            ${{ matrix.cross_compile }}gcc --version | head -1
          fi

      - name: 编译内核 (${{ matrix.arch }})
        id: build
        run: |
          set -euo pipefail
          SRC_DIR="${{ needs.prepare.outputs.src_dir }}"
          cd "$SRC_DIR"
          echo "当前目录: $(pwd)"
          CONFIG_FILE="Microsoft/config-wsl"
          echo "使用配置文件: $CONFIG_FILE"
          if [ -f "$CONFIG_FILE" ]; then
            echo "配置文件存在，大小: $(du -h "$CONFIG_FILE" | cut -f1)"
          else
            echo "错误: 配置文件 $CONFIG_FILE 不存在！"
            exit 1
          fi

          echo "开始编译 ${{ matrix.arch }} 内核..."
          echo "编译开始时间: $(date -u)"
          echo "可用核心数: $(nproc)"
          echo "内存信息:"
          free -h
          echo "-------------------"

          export PATH="/usr/lib/ccache:$PATH"

          BUILD_LOG="/tmp/build-${{ matrix.arch }}.log"
          if [ -n "${{ matrix.cross_compile }}" ]; then
            time make -j$(nproc) \
              ARCH=${{ matrix.kernel_arch }} \
              CROSS_COMPILE=${{ matrix.cross_compile }} \
              KCONFIG_CONFIG="$CONFIG_FILE" \
              ${{ matrix.kernel_target }} 2>&1 | tee "$BUILD_LOG"
          else
            time make -j$(nproc) \
              KCONFIG_CONFIG="$CONFIG_FILE" \
              ${{ matrix.kernel_target }} 2>&1 | tee "$BUILD_LOG"
          fi

          echo "-------------------"
          echo "编译完成时间: $(date -u)"
          echo "build-log=$BUILD_LOG" >> "$GITHUB_OUTPUT"

      - name: 编译统计
        run: |
          echo "=== ccache 统计 ==="
          ccache --show-stats
          echo "=== ccache 关键指标 ==="
          ccache --show-stats 2>&1 | grep -iE "Hits:|Misses:|hit rate|cache size|Local storage" || echo "(ccache 统计提取完成)"

      - name: 验证内核镜像
        id: verify
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          SRC_DIR="${{ needs.prepare.outputs.src_dir }}"

          if [ "${{ matrix.arch }}" = "x64" ]; then
            IMAGE_PATH="$SRC_DIR/arch/x86/boot/bzImage"
          else
            if [ -f "$SRC_DIR/arch/arm64/boot/Image.gz" ]; then
              IMAGE_PATH="$SRC_DIR/arch/arm64/boot/Image.gz"
            elif [ -f "$SRC_DIR/arch/arm64/boot/Image" ]; then
              IMAGE_PATH="$SRC_DIR/arch/arm64/boot/Image"
            else
              echo "错误: ARM64 内核镜像不存在"
              ls -la "$SRC_DIR/arch/arm64/boot/" 2>/dev/null || echo "目录不存在"
              exit 1
            fi
          fi

          if [ ! -f "$IMAGE_PATH" ]; then
            echo "错误: 在 $IMAGE_PATH 未找到内核镜像"
            ls -la "$(dirname "$IMAGE_PATH")" 2>/dev/null || echo "目录不存在"
            exit 1
          fi

          echo "${{ matrix.arch }} 内核镜像验证成功"
          echo "文件路径: $IMAGE_PATH"
          echo "文件大小: $(du -h "$IMAGE_PATH" | cut -f1)"

          echo "验证文件类型..."
          file "$IMAGE_PATH" || true

          echo "检查 bzImage 魔数..."
          xxd "$IMAGE_PATH" | head -3 || true

          echo "验证 WSL 关键内核配置..."
          CONFIG_FILE="$SRC_DIR/Microsoft/config-wsl"
          WSL_CONFIGS_OK="true"
          check_config() {
            local key="$1"
            local expected="$2"
            local actual
            actual=$(grep "^${key}=" "$CONFIG_FILE" 2>/dev/null || echo "")
            if [ -z "$actual" ]; then
              echo "  警告: $key 未在配置文件中找到"
              WSL_CONFIGS_OK="false"
            elif [ -n "$expected" ]; then
              local value=$(echo "$actual" | cut -d= -f2)
              if [ "$value" != "$expected" ]; then
                echo "  警告: $actual (期望: $expected)"
                WSL_CONFIGS_OK="false"
              else
                echo "  $actual ✓"
              fi
            else
              echo "  $actual"
            fi
          }
          echo "--- 关键配置检查 ---"
          check_config "CONFIG_HYPERV" "y"
          check_config "CONFIG_HYPERV_VSOCKET" "y"
          check_config "CONFIG_VSOCKETS" "y"
          check_config "CONFIG_9P_FS" "y"
          check_config "CONFIG_NET_9P" "y"
          check_config "CONFIG_LOCALVERSION" ""
          echo "---------------------"
          if [ "$WSL_CONFIGS_OK" = "false" ]; then
            echo "警告: 部分 WSL 关键配置未找到，但继续执行"
          else
            echo "WSL 关键配置检查通过"
          fi

          OUTPUT_FILE="bzImage-$TAG-${{ matrix.arch }}"
          cp "$IMAGE_PATH" "$OUTPUT_FILE"
          echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"
          echo "文件已重命名为: $OUTPUT_FILE"

      - name: 编译摘要
        run: |
          set -euo pipefail
          echo "======================================="
          echo "${{ matrix.arch }} 构建成功！"
          echo "======================================="
          TAG="${{ needs.prepare.outputs.tag }}"
          OUTPUT_FILE="bzImage-$TAG-${{ matrix.arch }}"
          if [ -f "$OUTPUT_FILE" ]; then
            echo "文件名: $OUTPUT_FILE"
            echo "文件大小: $(du -h "$OUTPUT_FILE" | cut -f1)"
            echo "SHA256: $(sha256sum "$OUTPUT_FILE" | cut -d' ' -f1)"
          fi
          echo "======================================="

      - name: 保存 ccache 缓存
        if: always() && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.arch }}-${{ needs.prepare.outputs.tag }}

      - name: 上传编译日志（失败时）
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: build-log-${{ matrix.arch }}-${{ needs.prepare.outputs.tag }}
          path: /tmp/build-${{ matrix.arch }}.log
          retention-days: 7
          compression-level: 1

      - name: 上传内核镜像（临时）
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: bzImage-${{ needs.prepare.outputs.tag }}-${{ matrix.arch }}
          path: bzImage-${{ needs.prepare.outputs.tag }}-${{ matrix.arch }}
          retention-days: 7
          compression-level: 6

  release:
    name: 发布内核
    needs: [prepare, build]
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: 下载 x64 内核镜像
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: bzImage-${{ needs.prepare.outputs.tag }}-x64

      - name: 下载 ARM64 内核镜像
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: bzImage-${{ needs.prepare.outputs.tag }}-arm64

      - name: 汇总构建信息
        id: summary
        run: |
          set -euo pipefail
          echo "=== 构建产物 ==="
          ls -la bzImage-*

          echo "--- 校验和 ---"
          X64_SHA256=$(sha256sum "bzImage-${{ needs.prepare.outputs.tag }}-x64" | cut -d' ' -f1)
          ARM64_SHA256=$(sha256sum "bzImage-${{ needs.prepare.outputs.tag }}-arm64" | cut -d' ' -f1)
          echo "x64   SHA256: $X64_SHA256"
          echo "arm64 SHA256: $ARM64_SHA256"

          echo "x64-sha256=$X64_SHA256" >> "$GITHUB_OUTPUT"
          echo "arm64-sha256=$ARM64_SHA256" >> "$GITHUB_OUTPUT"

      - name: 获取上游 Release Notes
        id: upstream-notes
        run: |
          set -euo pipefail
          echo "获取上游发布说明..."
          UPSTREAM_NOTES=$(curl -sSfL \
            --retry 3 \
            --user-agent "GitHub Actions (WSL2 Kernel Build)" \
            --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/microsoft/WSL2-Linux-Kernel/releases/tags/${{ needs.prepare.outputs.tag }}" \
            | jq -r '.body // "*上游未提供发布说明*"')
          echo "$UPSTREAM_NOTES" > /tmp/upstream_notes.md
          echo "notes-file=/tmp/upstream_notes.md" >> "$GITHUB_OUTPUT"

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          files: |
            bzImage-${{ needs.prepare.outputs.tag }}-x64
            bzImage-${{ needs.prepare.outputs.tag }}-arm64
          body: |
            # WSL2 内核预编译镜像

            **发布版本**: `${{ needs.prepare.outputs.tag }}`

            基于 [microsoft/WSL2-Linux-Kernel](https://github.com/microsoft/WSL2-Linux-Kernel) 自动编译。

            ## 支持架构
            | 架构 | 文件 | SHA256 |
            |------|------|--------|
            | x64 | `bzImage-${{ needs.prepare.outputs.tag }}-x64` | `${{ steps.summary.outputs.x64-sha256 }}` |
            | ARM64 | `bzImage-${{ needs.prepare.outputs.tag }}-arm64` | `${{ steps.summary.outputs.arm64-sha256 }}` |

            ## 构建信息
            - Runner: `${{ runner.os }} ${{ runner.arch }}` (`${{ runner.name }}`)
            - 触发方式: `${{ github.event_name }}`
            - 构建时间: `$(date -u +'%Y-%m-%d %H:%M:%S UTC')`

            ---

            ## 上游发布说明
            $(cat /tmp/upstream_notes.md 2>/dev/null || echo "*上游发布说明暂不可用*")
