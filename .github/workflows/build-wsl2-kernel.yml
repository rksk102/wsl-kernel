name: 构建 WSL2 内核（主流程）

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:
    inputs:
      tag:
        description: '指定标签（留空则使用最新发布版）'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  获取版本标签:
    uses: ./.github/workflows/get-latest-tag.yml
    with:
      tag: ${{ inputs.tag }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  下载源码:
    needs: 获取版本标签
    uses: ./.github/workflows/download-source.yml
    with:
      tag: ${{ needs.获取版本标签.outputs.tag }}

  编译内核:
    needs: [获取版本标签, 下载源码]
    uses: ./.github/workflows/build-kernel.yml
    with:
      tag: ${{ needs.获取版本标签.outputs.tag }}
      src-dir: ${{ needs.下载源码.outputs.src-dir }}

  上传最终产物:
    needs: [获取版本标签, 编译内核]
    uses: ./.github/workflows/upload-artifact.yml
    with:
      tag: ${{ needs.获取版本标签.outputs.tag }}
